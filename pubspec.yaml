name: emcc_digital
description: EMCC Digital - Sistema de Gestión Escolar Descentralizado
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  shared_preferences: ^2.2.0
  qr_flutter: ^1.4.0
  mobile_scanner: ^3.5.0
  flutter_local_notifications: ^16.0.0
  intl: ^0.18.0
  flutter_bluetooth_serial: ^0.4.0
  wifi_iot: ^0.3.0
  permission_handler: ^11.0.0
  http: ^1.1.0
  connectivity_plus: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

flutter_intl:
  enabled: false
