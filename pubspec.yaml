name: emcc_digital
description: EMCC Digital - Sistema de Gestión Escolar Descentralizado
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Base de datos
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  
  # Almacenamiento y preferencias
  shared_preferences: ^2.2.0
  
  # QR y escáner
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.0
  
  # Utilidades
  intl: ^0.18.0
  connectivity_plus: ^6.0.0
  http: ^1.1.0
  
  # Permisos
  permission_handler: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/
